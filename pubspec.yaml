name: gun_arena_io
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  cloud_firestore: ^6.2.0
  equatable: ^2.0.7
  firebase_auth: ^6.2.0
  firebase_core: ^4.6.0
  flame: ^1.35.1
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.0.10+1
  flutter_webrtc: ^1.4.1
  http: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/svg/tank/
    - assets/svg/bullet/
    - assets/svg/impact/
    - assets/svg/wall/
    - assets/svg/ground/
