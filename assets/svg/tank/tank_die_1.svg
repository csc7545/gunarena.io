<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -8 80 80">
  <!-- Tracks (slightly damaged) -->
  <rect x="4" y="8" width="10" height="48" rx="2" fill="#2A2A2A"/>
  <g stroke="#111" stroke-width="1">
    <line x1="4" y1="14" x2="14" y2="14"/>
    <line x1="4" y1="20" x2="14" y2="20"/>
    <line x1="4" y1="26" x2="14" y2="26"/>
    <line x1="4" y1="32" x2="14" y2="32"/>
    <line x1="4" y1="38" x2="14" y2="38"/>
    <line x1="4" y1="44" x2="14" y2="44"/>
    <line x1="4" y1="50" x2="14" y2="50"/>
  </g>
  <rect x="50" y="8" width="10" height="48" rx="2" fill="#2A2A2A"/>
  <g stroke="#111" stroke-width="1">
    <line x1="50" y1="14" x2="60" y2="14"/>
    <line x1="50" y1="20" x2="60" y2="20"/>
    <line x1="50" y1="26" x2="60" y2="26"/>
    <line x1="50" y1="32" x2="60" y2="32"/>
    <line x1="50" y1="38" x2="60" y2="38"/>
    <line x1="50" y1="44" x2="60" y2="44"/>
    <line x1="50" y1="50" x2="60" y2="50"/>
  </g>
  <!-- Hull (darkened) -->
  <rect x="12" y="10" width="40" height="44" rx="3" fill="#3A4622" stroke="#1F2710" stroke-width="0.8"/>
  <rect x="14" y="11" width="36" height="3" rx="1" fill="#4A5A2C" opacity="0.5"/>
  <line x1="14" y1="18" x2="50" y2="18" stroke="#1F2710" stroke-width="0.6"/>
  <rect x="22" y="48" width="20" height="3" fill="#1F2710"/>
  <!-- Damage cracks -->
  <polyline points="18,20 22,28 20,36 26,42" stroke="#1A1A1A" stroke-width="0.8" fill="none"/>
  <polyline points="46,16 42,24 48,30 44,40" stroke="#1A1A1A" stroke-width="0.8" fill="none"/>
  <!-- Scorch marks -->
  <circle cx="22" cy="20" r="3" fill="#1A1A1A" opacity="0.6"/>
  <circle cx="44" cy="42" r="2.5" fill="#1A1A1A" opacity="0.5"/>
  <!-- Turret (slightly tilted) -->
  <circle cx="32" cy="32" r="13" fill="#1F2710"/>
  <g transform="rotate(8 32 32)">
    <rect x="22" y="22" width="20" height="20" rx="3" fill="#2E3A1C" stroke="#1F2710" stroke-width="0.6"/>
    <rect x="23.5" y="23.5" width="17" height="2" rx="1" fill="#3D4A24" opacity="0.5"/>
    <rect x="29.5" y="2" width="5" height="24" fill="#1A1A1A"/>
    <rect x="28" y="22" width="8" height="3" rx="1" fill="#0F0F0F"/>
    <circle cx="32" cy="34" r="3.2" fill="#1A1A1A"/>
    <circle cx="32" cy="34" r="2" fill="#0A0A0A"/>
  </g>
  <!-- Initial flame burst from hatch -->
  <circle cx="32" cy="34" r="2.5" fill="#FF6B1A" opacity="0.8"/>
  <circle cx="32" cy="34" r="1.5" fill="#FFE066"/>
  <!-- First smoke wisps -->
  <circle cx="20" cy="14" r="2" fill="#5A5A5A" opacity="0.5"/>
  <circle cx="46" cy="16" r="1.8" fill="#6A6A6A" opacity="0.4"/>
</svg>
