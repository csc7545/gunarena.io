<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" preserveAspectRatio="none">
  <!-- Base shadow -->
  <rect x="0" y="0" width="64" height="64" fill="#5A4A2A" opacity="0.3"/>
  <!-- Sandbags (top-down view, staggered rows) -->
  <!-- Row 1 -->
  <ellipse cx="10" cy="10" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="10" cy="10" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <ellipse cx="32" cy="10" rx="9" ry="6" fill="#9A8350"/>
  <ellipse cx="32" cy="10" rx="7" ry="4" fill="#B89D5E" opacity="0.6"/>
  <ellipse cx="54" cy="10" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="54" cy="10" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <!-- Row 2 (staggered) -->
  <ellipse cx="21" cy="22" rx="9" ry="6" fill="#9A8350"/>
  <ellipse cx="21" cy="22" rx="7" ry="4" fill="#B89D5E" opacity="0.6"/>
  <ellipse cx="43" cy="22" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="43" cy="22" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <!-- Row 3 -->
  <ellipse cx="10" cy="34" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="10" cy="34" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <ellipse cx="32" cy="34" rx="9" ry="6" fill="#9A8350"/>
  <ellipse cx="32" cy="34" rx="7" ry="4" fill="#B89D5E" opacity="0.6"/>
  <ellipse cx="54" cy="34" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="54" cy="34" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <!-- Row 4 (staggered) -->
  <ellipse cx="21" cy="46" rx="9" ry="6" fill="#9A8350"/>
  <ellipse cx="21" cy="46" rx="7" ry="4" fill="#B89D5E" opacity="0.6"/>
  <ellipse cx="43" cy="46" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="43" cy="46" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <!-- Row 5 -->
  <ellipse cx="10" cy="56" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="10" cy="56" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <ellipse cx="32" cy="56" rx="9" ry="6" fill="#9A8350"/>
  <ellipse cx="32" cy="56" rx="7" ry="4" fill="#B89D5E" opacity="0.6"/>
  <ellipse cx="54" cy="56" rx="9" ry="6" fill="#A8915A"/>
  <ellipse cx="54" cy="56" rx="7" ry="4" fill="#C0A86A" opacity="0.6"/>
  <!-- Stitch marks on bags -->
  <g stroke="#6B5320" stroke-width="0.4" opacity="0.7">
    <line x1="6" y1="10" x2="14" y2="10"/>
    <line x1="28" y1="10" x2="36" y2="10"/>
    <line x1="50" y1="10" x2="58" y2="10"/>
    <line x1="17" y1="22" x2="25" y2="22"/>
    <line x1="39" y1="22" x2="47" y2="22"/>
    <line x1="6" y1="34" x2="14" y2="34"/>
    <line x1="28" y1="34" x2="36" y2="34"/>
    <line x1="50" y1="34" x2="58" y2="34"/>
    <line x1="17" y1="46" x2="25" y2="46"/>
    <line x1="39" y1="46" x2="47" y2="46"/>
    <line x1="6" y1="56" x2="14" y2="56"/>
    <line x1="28" y1="56" x2="36" y2="56"/>
    <line x1="50" y1="56" x2="58" y2="56"/>
