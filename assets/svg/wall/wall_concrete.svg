<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" preserveAspectRatio="none">
  <!-- Base -->
  <rect x="0" y="0" width="64" height="64" fill="#7A7A7A"/>
  <!-- Edge highlights (top, left lighter) -->
  <rect x="0" y="0" width="64" height="2" fill="#9A9A9A"/>
  <rect x="0" y="0" width="2" height="64" fill="#9A9A9A"/>
  <!-- Edge shadows (bottom, right darker) -->
  <rect x="0" y="62" width="64" height="2" fill="#4A4A4A"/>
  <rect x="62" y="0" width="2" height="64" fill="#4A4A4A"/>
  <!-- Inner border -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#5A5A5A" stroke-width="0.6"/>
  <!-- Distributed speckle texture (uniform so it tiles/stretches well) -->
  <g fill="#5E5E5E" opacity="0.7">
    <circle cx="8" cy="6" r="0.8"/>
    <circle cx="20" cy="10" r="0.7"/>
    <circle cx="32" cy="4" r="0.9"/>
    <circle cx="44" cy="8" r="0.8"/>
    <circle cx="56" cy="6" r="0.7"/>
    <circle cx="6" cy="18" r="0.7"/>
    <circle cx="18" cy="22" r="0.8"/>
    <circle cx="30" cy="20" r="0.7"/>
    <circle cx="42" cy="24" r="0.9"/>
    <circle cx="54" cy="18" r="0.7"/>
    <circle cx="8" cy="32" r="0.8"/>
    <circle cx="22" cy="34" r="0.7"/>
    <circle cx="34" cy="32" r="0.9"/>
    <circle cx="46" cy="36" r="0.7"/>
    <circle cx="58" cy="32" r="0.8"/>
    <circle cx="6" cy="46" r="0.7"/>
    <circle cx="20" cy="48" r="0.8"/>
    <circle cx="32" cy="44" r="0.7"/>
    <circle cx="46" cy="48" r="0.9"/>
    <circle cx="56" cy="46" r="0.7"/>
    <circle cx="10" cy="58" r="0.8"/>
    <circle cx="24" cy="56" r="0.7"/>
    <circle cx="36" cy="58" r="0.8"/>
    <circle cx="48" cy="56" r="0.7"/>
    <circle cx="58" cy="58" r="0.8"/>
  </g>
  <!-- Light speckles -->
  <g fill="#9A9A9A" opacity="0.5">
    <circle cx="14" cy="14" r="0.6"/>
    <circle cx="38" cy="12" r="0.5"/>
    <circle cx="50" cy="28" r="0.6"/>
    <circle cx="12" cy="40" r="0.5"/>
    <circle cx="40" cy="50" r="0.6"/>
    <circle cx="26" cy="28" r="0.5"/>
  </g>
  <!-- Subtle hairline cracks (short, multiple, distributed) -->
  <g stroke="#3F3F3F" stroke-width="0.4" fill="none" opacity="0.7">
    <polyline points="12,16 16,22 14,28"/>
    <polyline points="44,40 48,46 46,52"/>
    <polyline points="28,12 32,16"/>
    <polyline points="50,12 54,16"/>
  </g>
</svg>
