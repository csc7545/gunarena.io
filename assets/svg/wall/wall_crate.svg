<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" preserveAspectRatio="none">
  <!-- Drop shadow -->
  <rect x="2" y="2" width="62" height="62" fill="#000" opacity="0.3"/>
  <!-- Crate body (wood) -->
  <rect x="2" y="2" width="60" height="60" fill="#6B4F2A"/>
  <!-- Wood grain -->
  <rect x="2" y="2" width="60" height="60" fill="#8B6F3A" opacity="0.3"/>
  <!-- Plank lines (horizontal) -->
  <line x1="2" y1="22" x2="62" y2="22" stroke="#3F2A14" stroke-width="0.8"/>
  <line x1="2" y1="42" x2="62" y2="42" stroke="#3F2A14" stroke-width="0.8"/>
  <!-- Plank lines (vertical, slight) -->
  <line x1="32" y1="2" x2="32" y2="22" stroke="#5A3F1F" stroke-width="0.4" opacity="0.5"/>
  <line x1="22" y1="22" x2="22" y2="42" stroke="#5A3F1F" stroke-width="0.4" opacity="0.5"/>
  <line x1="42" y1="22" x2="42" y2="42" stroke="#5A3F1F" stroke-width="0.4" opacity="0.5"/>
  <line x1="32" y1="42" x2="32" y2="62" stroke="#5A3F1F" stroke-width="0.4" opacity="0.5"/>
  <!-- Metal edge frame -->
  <rect x="2" y="2" width="60" height="60" fill="none" stroke="#3A3A3A" stroke-width="2"/>
  <!-- Metal corners -->
  <path d="M 2 2 L 12 2 L 12 4 L 4 4 L 4 12 L 2 12 Z" fill="#5A5A5A"/>
  <path d="M 62 2 L 52 2 L 52 4 L 60 4 L 60 12 L 62 12 Z" fill="#5A5A5A"/>
  <path d="M 2 62 L 12 62 L 12 60 L 4 60 L 4 52 L 2 52 Z" fill="#5A5A5A"/>
  <path d="M 62 62 L 52 62 L 52 60 L 60 60 L 60 52 L 62 52 Z" fill="#5A5A5A"/>
  <!-- Corner bolts -->
  <circle cx="6" cy="6" r="1.2" fill="#1A1A1A"/>
  <circle cx="58" cy="6" r="1.2" fill="#1A1A1A"/>
  <circle cx="6" cy="58" r="1.2" fill="#1A1A1A"/>
  <circle cx="58" cy="58" r="1.2" fill="#1A1A1A"/>
  <!-- Stencil mark (X) -->
  <line x1="22" y1="28" x2="42" y2="36" stroke="#3F2A14" stroke-width="2.5" opacity="0.6"/>
  <line x1="42" y1="28" x2="22" y2="36" stroke="#3F2A14" stroke-width="2.5" opacity="0.6"/>
  <!-- Highlights (top-left lighter) -->
  <rect x="2" y="2" width="60" height="2" fill="#9A7A3A" opacity="0.5"/>
  <rect x="2" y="2" width="2" height="60" fill="#9A7A3A" opacity="0.5"/>
</svg>
