<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Base (matches existing dark map background tone) -->
  <rect x="0" y="0" width="64" height="64" fill="#2D2D2D"/>
  <!-- Tone variation patches (large, soft) -->
  <circle cx="14" cy="18" r="14" fill="#353535" opacity="0.6"/>
  <circle cx="48" cy="40" r="16" fill="#272727" opacity="0.7"/>
  <circle cx="32" cy="56" r="10" fill="#333" opacity="0.5"/>
  <!-- Speckle texture (distributed for tile/stretch) -->
  <g fill="#3A3A3A" opacity="0.7">
    <circle cx="6" cy="6" r="0.7"/>
    <circle cx="18" cy="4" r="0.6"/>
    <circle cx="30" cy="8" r="0.7"/>
    <circle cx="42" cy="6" r="0.6"/>
    <circle cx="54" cy="4" r="0.7"/>
    <circle cx="10" cy="16" r="0.6"/>
    <circle cx="22" cy="20" r="0.7"/>
    <circle cx="34" cy="18" r="0.6"/>
    <circle cx="46" cy="22" r="0.7"/>
    <circle cx="58" cy="16" r="0.6"/>
    <circle cx="6" cy="30" r="0.7"/>
    <circle cx="20" cy="32" r="0.6"/>
    <circle cx="32" cy="34" r="0.7"/>
    <circle cx="44" cy="30" r="0.6"/>
    <circle cx="56" cy="34" r="0.7"/>
    <circle cx="10" cy="44" r="0.6"/>
    <circle cx="24" cy="46" r="0.7"/>
    <circle cx="38" cy="44" r="0.6"/>
    <circle cx="50" cy="48" r="0.7"/>
    <circle cx="60" cy="44" r="0.6"/>
    <circle cx="8" cy="58" r="0.7"/>
    <circle cx="22" cy="60" r="0.6"/>
    <circle cx="36" cy="58" r="0.7"/>
    <circle cx="48" cy="60" r="0.6"/>
    <circle cx="60" cy="58" r="0.7"/>
  </g>
  <!-- Light dust grains -->
  <g fill="#4A4A4A" opacity="0.5">
    <circle cx="16" cy="12" r="0.5"/>
    <circle cx="40" cy="14" r="0.4"/>
    <circle cx="50" cy="28" r="0.5"/>
    <circle cx="14" cy="38" r="0.4"/>
    <circle cx="28" cy="50" r="0.5"/>
    <circle cx="44" cy="52" r="0.4"/>
    <circle cx="58" cy="40" r="0.5"/>
  </g>
  <!-- Hairline cracks (very subtle) -->
  <g stroke="#1F1F1F" stroke-width="0.4" fill="none" opacity="0.6">
    <polyline points="8,24 14,28 12,36"/>
    <polyline points="44,12 48,18"/>
    <polyline points="50,46 54,52 52,58"/>
    <polyline points="24,40 28,44"/>
