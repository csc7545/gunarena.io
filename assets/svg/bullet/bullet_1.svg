<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 40 40">
  <!-- Smoke trail (behind, below) -->
  <circle cx="16" cy="30" r="3" fill="#7A7A7A" opacity="0.45"/>
  <circle cx="13" cy="32" r="2" fill="#9A9A9A" opacity="0.4"/>
  <circle cx="19" cy="33" r="2.2" fill="#888" opacity="0.42"/>
  <circle cx="16" cy="26" r="2.5" fill="#5A5A5A" opacity="0.55"/>
  <!-- Hot ember just behind base -->
  <circle cx="16" cy="22" r="2" fill="#FF6B1A" opacity="0.85"/>
  <circle cx="16" cy="22" r="1.2" fill="#FFC233"/>
  <!-- Shell base (darker brass) -->
  <rect x="12" y="18" width="8" height="3" rx="0.5" fill="#6B5320"/>
  <!-- Shell body (brass) -->
  <rect x="12" y="10" width="8" height="8" fill="#C49A3F"/>
  <!-- Body highlight -->
  <rect x="13" y="10" width="2" height="8" fill="#E0BB6A" opacity="0.8"/>
  <!-- Body shadow -->
  <rect x="18" y="10" width="2" height="8" fill="#8B6F2A" opacity="0.7"/>
  <!-- Tip cone -->
  <polygon points="16,2 12,10 20,10" fill="#9A7A2E"/>
  <polygon points="16,2 14,10 16,10" fill="#C49A3F"/>
  <!-- Tip apex highlight -->
  <polygon points="16,2 15,5 17,5" fill="#FFE066" opacity="0.6"/>
</svg>
